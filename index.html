<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>9K LEGEND LABS | KNOCKSSTUDiOS</title>
    <style>
        :root {
            --rose-gold: #b76e79;
            --cyan: #00f2ff;
            --obsidian: #050505;
            --glass: rgba(255, 255, 255, 0.05);
            --gold: #d4af37;
        }

        body, html {
            background: var(--obsidian);
            color: #fff;
            font-family: 'Inter', 'Courier New', monospace;
            margin: 0;
            overflow-x: hidden;
            height: 100%;
        }

        /* --- THE TITANGINE INTRO --- */
        #intro-overlay {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .eye-logo {
            width: 120px; height: 120px;
            border: 2px solid var(--rose-gold);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 40px var(--rose-gold);
            animation: pulseExpand 2s infinite alternate;
        }

        .eye-inner { width: 30px; height: 30px; background: var(--cyan); border-radius: 50%; box-shadow: 0 0 15px var(--cyan); }

        /* --- LOGIN GATE --- */
        #login-gate {
            display: none; position: fixed; inset: 0; z-index: 8000;
            background: var(--obsidian); justify-content: center; align-items: center;
        }

        .login-card {
            background: var(--glass); border: 1px solid var(--rose-gold);
            padding: 40px; border-radius: 30px; backdrop-filter: blur(20px);
            text-align: center; width: 90%; max-width: 400px;
        }

        input {
            width: 100%; padding: 15px; margin: 10px 0;
            background: rgba(255,255,255,0.1); border: 1px solid var(--cyan);
            border-radius: 10px; color: #fff; text-align: center;
        }

        .btn-9k {
            background: var(--rose-gold); color: #000; width: 100%;
            padding: 15px; border: none; border-radius: 10px;
            font-weight: 900; cursor: pointer; margin-top: 10px;
        }

        /* --- MAIN HUB --- */
        #main-hub { display: none; opacity: 0; transition: 1.5s; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .e-bot { width: 60px; height: 60px; border: 2px solid var(--cyan); border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; color: var(--cyan); box-shadow: 0 0 20px var(--cyan); font-style: italic; font-weight: 900; }

        @keyframes pulseExpand { from { transform: scale(1); opacity: 0.8; } to { transform: scale(1.1); opacity: 1; } }
    </style>
</head>
<body>

    <div id="intro-overlay" onclick="initializeEngine()">
        <div class="eye-logo"><div class="eye-inner"></div></div>
        <h2 style="margin-top: 30px; letter-spacing: 10px; color: var(--rose-gold);">KNOCKSSTUDiOS</h2>
        <p style="font-size: 10px; opacity: 0.5; margin-top: 10px;">TAP TO INITIALIZE 9K CORE</p>
    </div>

    <div id="login-gate">
        <div class="login-card">
            <h2 style="color: var(--rose-gold); letter-spacing: 5px;">LEGEND LOGIN</h2>
            <input type="text" id="username" placeholder="LEGEND NAME">
            <input type="password" id="passkey" placeholder="SECURE PASSKEY">
            <button class="btn-9k" onclick="validateLegend()">ENTER THE LAB</button>
        </div>
    </div>

    <div id="main-hub">
        <div style="text-align: center; padding: 40px 0;">
            <div class="e-bot">e</div>
            <h1 style="letter-spacing: 15px;">KNOCKSSTUD<span style="text-transform: lowercase; font-style: italic; color: var(--cyan);">i</span>OS</h1>
            <div style="color: var(--gold); font-size: 24px; font-weight: 900; margin-top: 20px;">2,000 COINS ACTIVE</div>
        </div>
        <div style="border: 1px solid var(--glass); padding: 20px; border-radius: 20px;">
            <h3>MISSION: SCHOOL OF HARD KNOCKS</h3>
            <p style="opacity: 0.6;">Status: Sovereign Pulse Active. Welcome home, Legend.</p>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function initializeEngine() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('intro-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-overlay').style.display = 'none';
                // Check if already logged in
                if (localStorage.getItem('legend_session') === 'active') {
                    showHub();
                } else {
                    document.getElementById('login-gate').style.display = 'flex';
                }
            }, 1000);
        }

        function validateLegend() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('passkey').value;

            // Basic validation - You can expand this logic later
            if (user !== "" && pass !== "") {
                localStorage.setItem('legend_session', 'active');
                document.getElementById('login-gate').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-gate').style.display = 'none';
                    showHub();
                }, 500);
            } else {
                alert("The Eye requires a valid Legend Name and Passkey.");
            }
        }

        function showHub() {
            const hub = document.getElementById('main-hub');
            hub.style.display = 'block';
            setTimeout(() => hub.style.opacity = '1', 50);
        }
    </script>
</body>
</html>
