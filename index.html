<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOCKSSTUDiOS | The Sovereign Pulse</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --gold: #ffd700;
            --mechanical-i: #b8860b;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #000;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* Screensaver Style 3D Bubbly Letters */
        #screensaver {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .floating-logo {
            font-size: 5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 5px;
            background: linear-gradient(135deg, #fff, var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 10px 20px rgba(255,215,0,0.3));
            animation: float 15s ease-in-out infinite;
        }

        .lowercase-i {
            -webkit-text-fill-color: var(--mechanical-i);
            font-style: italic;
            text-shadow: 0 0 10px var(--gold);
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate3d(1, 1, 1, 0deg); }
            25% { transform: translate(20vw, -30vh) rotate3d(1, 0, 1, 90deg); }
            50% { transform: translate(-10vw, 20vh) rotate3d(0, 1, 1, 180deg); }
            75% { transform: translate(-25vw, -15vh) rotate3d(1, 1, 0, 270deg); }
        }

        /* Login Container */
        .login-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 3rem;
            border-radius: 20px;
            width: 350px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--gold);
            color: white;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--gold);
            color: black;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--gold);
        }

        #adminPanel, #secondLogin { display: none; }
    </style>
</head>
<body>

    <div id="screensaver">
        <div class="floating-logo">KNOCKS STUD<span class="lowercase-i">i</span>OS</div>
    </div>

    <div id="loginScreen" class="login-card">
        <h2 style="text-align: center;">LOGIN</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="handleLogin()">ENTER</button>
        <p style="font-size: 0.8rem; text-align: center; margin-top: 15px; opacity: 0.7;">
            9K Standard Engine Active | Background Bots: Online
        </p>
    </div>

    <div id="secondLogin" class="login-card">
        <h2 style="text-align: center; color: var(--gold);">SECURE ACCESS</h2>
        <p style="text-align: center;">Enter Key to Proceed</p>
        <input type="password" id="secretKey" placeholder="Master Key">
        <button onclick="verifyMaster()">ACTIVATE ENGINE</button>
    </div>

    <div id="adminPanel" class="login-card" style="width: 80%; height: 80%; overflow-y: auto;">
        <h1>Owner Control Center</h1>
        <hr>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="glass-module">
                <h3>Employee Management</h3>
                <button onclick="alert('Accessing Payroll...')">Checks & Payroll</button>
                <button onclick="alert('Adding Employee...')">Hire New Staff</button>
            </div>
            <div class="glass-module">
                <h3>Background Pulse (Bots)</h3>
                <ul>
                    <li>Auto-Backup: <span style="color: lime;">Active</span></li>
                    <li>Engine Updates: <span style="color: lime;">Running (Silent)</span></li>
                    <li>File Sync: <span style="color: lime;">Stable</span></li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        // Use your specific "Sovereign" logic
        function handleLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            // Scenario 1: Regular Admin (KNOCKSSTUDIOS / adamant)
            if (u === "KNOCKSSTUDIOS" && p === "adamant") {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
            } 
            // Scenario 2: Trigger Second Login (adamant / [your hidden key])
            else if (u === "adamant") {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('secondLogin').style.display = 'block';
            } 
            else {
                alert("Access Denied. Check credentials.");
            }
        }

        function verifyMaster() {
            // This is where you put your secret master key logic
            const key = document.getElementById('secretKey').value;
            if (key !== "") { // Put your key inside the quotes
                document.getElementById('secondLogin').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                console.log("Sovereign Pulse Active. Backups running.");
            }
        }

        // Background "Bot" Simulation - Handles errors without crashing
        setInterval(() => {
            console.log("Pulse Bot: Checking system health... All backups secure.");
        }, 30000);
    </script>
</body>
</html>
