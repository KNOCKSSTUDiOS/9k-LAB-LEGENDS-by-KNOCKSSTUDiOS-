<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Knox Studios - Tactical 9k Ultra</title>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        #overlay {
            position: absolute; top: 20px; left: 20px; color: #00f0ff;
            text-shadow: 0 0 5px #00f0ff; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="overlay">
        <h1>SATELLITE FEED: 9K ULTRA TITAN</h1>
        <p>STATUS: LEGEND AWAKENED // ONLINE</p>
        <p>LOCATION: KNOX STUDIOS MANSION</p>
    </div>
    <canvas id="radarCanvas"></canvas>

<script>
const canvas = document.getElementById('radarCanvas');
const ctx = canvas.getContext('2d');

let width, height;
let zoom = 1;
let linePosH = 0; // Horizontal line position
let linePosV = 0; // Vertical line position

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}

window.addEventListener('resize', resize);
resize();

function drawGrid() {
    ctx.strokeStyle = "rgba(0, 100, 255, 0.3)";
    ctx.lineWidth = 1;
    const gridSize = 50 * zoom;

    for (let x = 0; x < width; x += gridSize) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke();
    }
    for (let y = 0; y < height; y += gridSize) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke();
    }
}

function drawStructures() {
    // Knox Studios - Represented as high-tech geometric blocks
    ctx.fillStyle = "rgba(0, 150, 255, 0.5)";
    ctx.strokeStyle = "#00f0ff";
    ctx.lineWidth = 2;

    const centerX = width / 2;
    const centerY = height / 2;

    // The Main Studio Block
    const size = 150 * zoom;
    ctx.fillRect(centerX - size/2, centerY - size/2, size, size);
    ctx.strokeRect(centerX - size/2, centerY - size/2, size, size);

    // Labels
    ctx.fillStyle = "#00f0ff";
    ctx.fillText("KNOX STUDIOS HQ", centerX - size/2, centerY - size/2 - 10);
}

function drawScope() {
    const cx = width / 2;
    const cy = height / 2;
    const gap = 20 / zoom; // Lines don't touch in the middle
    const length = 100 / zoom;

    ctx.strokeStyle = "#00f0ff";
    ctx.lineWidth = 3;

    // Scope Lines - different paces
    linePosH = (Date.now() / 15) % width;
    linePosV = (Date.now() / 20) % height;

    // The 4 Corner Points (Crosshair)
    // Top
    ctx.beginPath(); ctx.moveTo(cx, cy - gap); ctx.lineTo(cx, cy - gap - length); ctx.stroke();
    // Bottom
    ctx.beginPath(); ctx.moveTo(cx, cy + gap); ctx.lineTo(cx, cy + gap + length); ctx.stroke();
    // Left
    ctx.beginPath(); ctx.moveTo(cx - gap, cy); ctx.lineTo(cx - gap - length, cy); ctx.stroke();
    // Right
    ctx.beginPath(); ctx.moveTo(cx + gap, cy); ctx.lineTo(cx + gap + length, cy); ctx.stroke();
}

function animate() {
    ctx.fillStyle = "rgba(0, 10, 30, 1)";
    ctx.fillRect(0, 0, width, height);

    // Simulate zooming effect
    zoom = 1 + Math.sin(Date.now() / 2000) * 0.2;

    drawGrid();
    drawStructures();
    drawScope();

    // Scanning Line (The pace-setter)
    ctx.strokeStyle = "rgba(0, 240, 255, 0.2)";
    ctx.beginPath(); ctx.moveTo(0, linePosV); ctx.lineTo(width, linePosV); ctx.stroke();

    requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
