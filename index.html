<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9K TITANGINE | KNOCKSSTUDiOS</title>
    <style>
        :root {
            --sovereign-pulse: #b76e79; /* Rose Gold */
            --sentinel-cyan: #00f2ff;
            --9k-black: #000000;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--9k-black);
            color: #fff;
            font-family: 'Courier New', monospace;
            height: 100vh; width: 100vw;
            overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* --- STAGE 1: THE CLEAN SLATE --- */
        #eye-center {
            position: fixed;
            width: 60px; height: 60px;
            border: 2px solid var(--sovereign-pulse);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--sovereign-pulse);
            z-index: 1000;
            transition: all 1s ease;
        }

        #eye-pupil {
            width: 15px; height: 15px;
            background: var(--sentinel-cyan);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--sentinel-cyan);
        }

        /* --- STAGE 2: THE SENTINEL TILES --- */
        #tile-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            opacity: 0;
            transition: opacity 2s ease;
            width: 100%;
            max-width: 500px;
        }

        .sentinel-tile {
            width: 100%;
            padding: 25px;
            background: rgba(183, 110, 121, 0.05);
            border: 1px solid rgba(183, 110, 121, 0.3);
            backdrop-filter: blur(10px);
            text-align: center;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease;
            cursor: pointer;
        }

        .sentinel-tile:hover {
            border-color: var(--sentinel-cyan);
            background: rgba(0, 242, 255, 0.05);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }

        .tile-active { opacity: 1; transform: translateY(0); }

        #wisdom-display {
            position: fixed; top: 20px; text-align: center;
            letter-spacing: 5px; color: var(--sovereign-pulse);
            font-size: 0.8rem; opacity: 0; transition: 2s;
        }

        #radio-hub { margin-top: 10px; font-size: 0.7rem; color: var(--sentinel-cyan); }
    </style>
</head>
<body>

    <div id="wisdom-display">TRADEMARK: KNOCKSSTUDiOS // MISSION: 2,000 COINS</div>

    <div id="eye-center">
        <div id="eye-pupil"></div>
    </div>

    <div id="tile-container">
        <div class="sentinel-tile" onclick="alert('Legends Portal Opening...')">GATEWAY: SIGN IN / SIGN UP</div>
        
        <div class="sentinel-tile">
            THE SCHOOL RADIO
            <div id="radio-hub">STATION: 92.3 // THE STREETS</div>
            <div style="display:flex; justify-content:center; gap:10px; margin-top:10px;">
                <button onclick="tune('92.3')" style="background:none; border:1px solid #fff; color:#fff;">92.3</button>
                <button onclick="tune('101.5')" style="background:none; border:1px solid #fff; color:#fff;">101.5</button>
            </div>
        </div>

        <div class="sentinel-tile" id="daily-text">PULSE: LOADING WISDOM...</div>

        <div class="sentinel-tile" style="border-style: dashed;">UPGRADE: SUBSCRIPTION TIERS</div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let engineStarted = false;

        const wisdom = [
            "The architect builds while the world sleeps.",
            "2,000 Coins. 2,000 Legends. No Permission.",
            "The Eye sees the vision; the Engine makes it real.",
            "Hard Knocks produce the sharpest steel."
        ];

        // --- THE STARTUP PULSE ---
        window.onmousemove = () => {
            if (!engineStarted) {
                engineStarted = true;
                initiatePulse();
            }
        };

        function initiatePulse() {
            // Audio Slam
            playSlam(60);

            // Visual Transition
            document.getElementById('eye-center').style.transform = "translateY(-280px) scale(0.5)";
            document.getElementById('wisdom-display').style.opacity = "1";
            document.getElementById('tile-container').style.opacity = "1";
            document.getElementById('daily-text').innerText = wisdom[Math.floor(Math.random()*wisdom.length)];

            // Sequential Tile Materialization
            const tiles = document.querySelectorAll('.sentinel-tile');
            tiles.forEach((tile, i) => {
                setTimeout(() => {
                    tile.classList.add('tile-active');
                    playSlam(200 + (i * 50), 0.1);
                }, 500 + (i * 400));
            });
        }

        function playSlam(freq, vol = 0.2) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1, audioCtx.currentTime + 1);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 1);
        }

        function tune(station) {
            document.getElementById('radio-hub').innerText = `STATION: ${station} // CONNECTED`;
            playSlam(parseFloat(station), 0.2);
        }
    </script>
</body>
</html>
