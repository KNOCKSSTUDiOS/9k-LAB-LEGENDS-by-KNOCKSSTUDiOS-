<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAB LEGENDS | KNOCKSSTUDiOS</title>
    <style>
        :root {
            --rose-gold: #b76e79;
            --bmw-red: #ff0000;
            --shop-dark: #0d0d0d;
            --memory-gold: #f7e7ce;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            transition: background-color 1.5s ease;
        }

        /* --- STUDIO INTRO --- */
        #studio-intro {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: black;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 10000;
            animation: fadeOutIntro 6s forwards;
        }

        .knocks-logo {
            font-size: 3.5rem; letter-spacing: 15px;
            color: var(--rose-gold);
            text-shadow: 0 0 20px var(--bmw-red);
            margin: 0;
            animation: logoSlam 1.8s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        .sub-logo { font-size: 1rem; letter-spacing: 5px; opacity: 0.7; }

        /* --- CINEMATIC OVERLAYS --- */
        #film-layer {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
            transition: filter 2s ease;
        }

        .memory-active { filter: sepia(0.6) brightness(1.1); }
        .shop-active { filter: grayscale(0.5) brightness(0.4) contrast(1.3); }

        #bmw-taillight {
            position: fixed; top: 20%; right: 10%;
            width: 200px; height: 80px;
            background: radial-gradient(circle, var(--bmw-red) 0%, transparent 70%);
            opacity: 0; filter: blur(30px);
            transition: opacity 1.5s ease;
        }

        /* --- CONTENT SCROLLING --- */
        .content-section {
            height: 150vh; display: flex;
            justify-content: center; align-items: center;
            text-align: center; padding: 40px;
        }

        @keyframes logoSlam {
            0% { transform: scale(8); opacity: 0; filter: blur(40px); }
            100% { transform: scale(1); opacity: 1; filter: blur(0); }
        }

        @keyframes fadeOutIntro {
            80% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body class="memory-active">

    <div id="studio-intro">
        <h1 class="knocks-logo">KNOCKSSTUDiOS</h1>
        <p class="sub-logo">A LAB LEGENDS PRODUCTION</p>
    </div>

    <div id="film-layer"></div>
    <div id="bmw-taillight"></div>

    <section class="content-section">
        <h2 id="narration-text">"Every story starts like no other..."</h2>
    </section>

    <section class="content-section">
        <h2 id="narration-text-2">"But this story... is different."</h2>
    </section>

    <script id="titangine-blueprint">
        const TITANGINE_DATA = "P)h>@6aWAK2modQMO=`r3jO*3003hF000jF003}la4%n9X..."; // Your Ascii85 Block
    </script>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let slamPlayed = false;

        // 9K SLAM SOUND LOGIC
        function playSlamSound(freq) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 1);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 1);
        }

        // SCROLL ENGINE
        window.onscroll = function() {
            const scrollPercent = (window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100;
            const filmLayer = document.getElementById('film-layer');
            const taillight = document.getElementById('bmw-taillight');

            // TRANSITION AT 50%
            if (scrollPercent >= 50 && !slamPlayed) {
                playSlamSound(120);
                document.body.classList.replace('memory-active', 'shop-active');
                taillight.style.opacity = "0.7";
                document.getElementById('narration-text-2').innerText = "The architect waits in the dark.";
                slamPlayed = true;
            } else if (scrollPercent < 50) {
                document.body.classList.replace('shop-active', 'memory-active');
                taillight.style.opacity = "0";
                slamPlayed = false;
            }
        };

        // STARTUP
        window.onload = () => {
            console.log("TITANGINE: 9K Standard Active.");
            setTimeout(() => { playSlamSound(60); }, 500); // Intro Hit
        };
    </script>
</body>
</html>
